<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mario JS" />
  <meta name="theme-color" content="#1a0a2e" />
  <meta name="description" content="Super Mario World platformer – 4 levels, vijanden, power-ups!" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Super Mario World JS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="ui-overlay">
    <div id="hud">
      <span>🍄 <span id="lives">3</span></span>
      <span>⭐ <span id="score">0</span></span>
      <span>🪙 <span id="coins">0</span></span>
      <span>🌍 <span id="level-num">1</span></span>
      <span>⏱ <span id="timer">300</span></span>
    </div>
  </div>

  <div id="screen-start" class="screen active">
    <div class="title-logo">
      <div class="logo-shadow">SUPER</div>
      <div class="logo-main">MARIO</div>
      <div class="logo-sub">WORLD JS</div>
    </div>
    <div class="pixel-mario-anim">🍄</div>
    <button class="big-btn" id="btn-play">▶ SPELEN</button>
    <div class="controls-hint">
      <span>← → Lopen</span>
      <span>▲ / Z = Springen</span>
      <span>B = Rennen / Schieten</span>
    </div>
    <div id="install-banner">
      <span>📲 Voeg toe aan beginscherm</span>
      <button id="btn-install">Installeer</button>
      <button id="btn-install-dismiss">✕</button>
    </div>
  </div>

  <div id="screen-gameover" class="screen">
    <h1>GAME OVER</h1>
    <p>Score: <span id="final-score">0</span></p>
    <button class="big-btn" id="btn-retry">↩ OPNIEUW</button>
  </div>

  <div id="screen-win" class="screen">
    <h1>🎉 GEWONNEN!</h1>
    <p>Score: <span id="win-score">0</span></p>
    <button class="big-btn" id="btn-again">▶ NOGMAALS</button>
  </div>

  <!-- Portrait hint -->
  <div id="portrait-hint">
    <div class="rotate-icon">📱</div>
    <p>Draai je telefoon</p>
    <p style="font-size:9px;color:#888">Dit spel speelt in landscape</p>
  </div>

  <canvas id="gameCanvas"></canvas>

  <button id="btn-pause">⏸</button>

  <div id="dpad">
    <div class="dpad-row">
      <div></div>
      <button class="dpad-btn" id="btn-up">▲</button>
      <div></div>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="btn-left">◀</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" id="btn-right">▶</button>
    </div>
    <div class="dpad-row">
      <div></div>
      <button class="dpad-btn" id="btn-down">▼</button>
      <div></div>
    </div>
  </div>

  <div id="action-btns">
    <button class="action-btn btn-b" id="btn-run">B<br><span>Ren</span></button>
    <button class="action-btn btn-a" id="btn-jump">A<br><span>Spring</span></button>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
      });
    }
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      document.getElementById('install-banner').style.display = 'flex';
    });
    document.getElementById('btn-install').addEventListener('click', () => {
      deferredPrompt?.prompt();
      document.getElementById('install-banner').style.display = 'none';
    });
    document.getElementById('btn-install-dismiss').addEventListener('click', () => {
      document.getElementById('install-banner').style.display = 'none';
    });
    document.getElementById('btn-play').addEventListener('click',  () => window._startGame?.());
    document.getElementById('btn-retry').addEventListener('click', () => window._startGame?.());
    document.getElementById('btn-again').addEventListener('click', () => window._startGame?.());
    document.getElementById('btn-pause').addEventListener('click', () => window._togglePause?.());
    document.addEventListener('touchmove', e => { if(e.touches.length>1) e.preventDefault(); }, {passive:false});
    document.addEventListener('gesturestart', e => e.preventDefault());
  </script>
</body>
</html>
